{% extends 'core/base.html' %}

{% block title %} {{project.title}} {% endblock %}

{% block content %}
    <h2>{{project.title}}</h2>
    <p> {{project.description}} </p>

    {% if project.github_link %}
        <p><a href="{{project.github_link}}">Github</a></p>
    {% endif %}

    <p><a href="{% url 'projects' %}">Back to Projects</a></p>
{% endblock %}
