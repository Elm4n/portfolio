<!DOCTYPE html>
<html lang="tr" dir="ltr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}My Portfolio{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <header>
            <h1>My Portfolio</h1>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container">
                    <a class="navbar-brand" href="{% url 'home' %}">My Portfolio</a>
                    <div>
                        <a class="nav-link text-white d-inline" href="/">Home</a>
                        <a class="nav-link text-white d-inline" href="{% url 'projects' %}">Projects</a>
                        <a class="nav-link text-white d-inline" href="{% url 'about' %}">About</a>   
                    </div>
                </div>
            </nav>
            <div class="container mt-4">
                {% block content %}
                {% endblock %}
            </div>
    </body>
</html>
